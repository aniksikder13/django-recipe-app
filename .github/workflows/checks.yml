name: Checks

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:

env:  # shared environment for all jobs
  APP_PORT: ${{ secrets.APP_PORT }}
  DB_PORT: ${{ secrets.DB_PORT }}
  DB_NAME: ${{ secrets.DB_NAME }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  DB_HOST: ${{ secrets.DB_HOST }}

jobs:
  Lint:
    runs-on: ubuntu-latest
    environment: app-env
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_KEY }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Lint
        run: docker compose run --rm recipe-backend sh -c "flake8"

  Test:
    runs-on: ubuntu-latest
    environment: app-env
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_KEY }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Wait for DB
        run: python manage.py wait_for_db

      - name: Test
        run: docker compose run --rm recipe-backend sh -c "python manage.py test"